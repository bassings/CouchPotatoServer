name: Mutation Testing

# Mutation testing is slow, so it runs nightly and on-demand — NOT per-PR.
# It is informational (never blocks a merge); use the reports to find weak
# spots in the test suite (mutants that survived = behaviour no test pins down).

on:
  schedule:
    # 03:17 UTC nightly (off-peak; odd minute to avoid the top-of-hour rush).
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      paths:
        description: 'Override paths_to_mutate (space-separated, optional)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  python-mutation:
    name: Python (mutmut)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run mutmut
        env:
          PYTHONPATH: ${{ github.workspace }}/libs
        # Never fail the job on surviving mutants — this is a report, not a gate.
        run: |
          mutmut run ${{ github.event.inputs.paths }} || true
          echo '## Python mutation results' >> "$GITHUB_STEP_SUMMARY"
          mutmut results >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: Generate HTML report
        run: mutmut html || true

      - name: Upload mutmut report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutmut-report
          path: html/
          retention-days: 14

  js-mutation:
    name: JS (Stryker)
    runs-on: ubuntu-latest
    # Inert until Alpine/htmx components are extracted into importable modules
    # under couchpotato/static/scripts/ui/ (see stryker.conf.json). Kept here so
    # the pipeline is ready; tolerated-failure so an empty scope doesn't go red.
    continue-on-error: true
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker
        run: npm run test:mutation || true

      - name: Upload Stryker report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 14
