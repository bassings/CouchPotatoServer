name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install ruff
      run: pip install ruff>=0.9.0

    - name: Run ruff
      run: ruff check .

  # Fast static guardrail for the modern UI (couchpotato/ui/templates/**):
  # off-spec toggle sizing, legacy icon-font classes, raw hex colors. Pure
  # stdlib, no build/deps, so it's cheap to run as its own gating job. See
  # scripts/check_conformance.py and specs/UI-CONFORM-02-ci-guardrail.md.
  conformance:
    name: conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Run UI conformance check
      run: python scripts/check_conformance.py

  # Static security lint (ruff's flake8-bandit "S" rules). INFORMATIONAL for now:
  # the legacy codebase has ~169 S findings, so this does not gate merges yet.
  # Triage the annotations and ratchet specific S codes into the blocking `lint`
  # job (pyproject [tool.ruff.lint] select) as they're cleared.
  security-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install ruff
      run: pip install ruff>=0.15.16

    - name: ruff security lint (bandit S rules)
      continue-on-error: true
      run: ruff check --select S --output-format=github couchpotato/ CouchPotato.py

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}/libs
      run: |
        python -m pytest tests/unit/ -v --tb=short -W ignore::SyntaxWarning

    - name: Check core modules import
      env:
        PYTHONPATH: ${{ github.workspace }}/libs
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        for mod in ['couchpotato.api', 'couchpotato.core.settings', 'couchpotato.core.database']:
            __import__(mod)
            print(f'OK: {mod}')
        "

  ui-unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run unit tests
      run: npm run test:unit

  ui-e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: [test, ui-unit-tests]
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Start CouchPotato server
      env:
        PYTHONPATH: ${{ github.workspace }}/libs
      run: |
        python CouchPotato.py --data_dir=.config &
        sleep 10
        curl -sf http://localhost:5050/ || exit 1
    
    - name: Run E2E tests
      run: npm run test:e2e -- --project=chromium
    
    - name: Upload test artifacts
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  accessibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: ui-e2e-tests
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Node dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Start CouchPotato server
      env:
        PYTHONPATH: ${{ github.workspace }}/libs
      run: |
        python CouchPotato.py --data_dir=.config &
        sleep 10
    
    - name: Run accessibility tests
      run: npm run test:a11y
    
    - name: Upload accessibility report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: accessibility-report
        path: playwright-report/
        retention-days: 7

  # Summary job for branch protection — requires all test matrix jobs to pass
  test-summary:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Check test matrix
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "Test matrix failed: ${{ needs.test.result }}"
          exit 1
        fi

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: test

    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        push: false
        tags: couchpotato:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test container starts
      run: |
        docker run -d --name cp-test -p 5050:5050 couchpotato:test
        sleep 15
        curl -sf http://localhost:5050/ || (docker logs cp-test && exit 1)
        docker stop cp-test

    # Image vulnerability scan (the manual pre-release Trivy step, now in CI).
    # Alpine base targets 0 CVEs; fail on fixable HIGH/CRITICAL so a regression
    # is caught before release. ignore-unfixed keeps un-patchable upstream CVEs
    # from blocking unrelated PRs; .trivyignore suppresses the DS-0002 false +.
    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: couchpotato:test
        scanners: vuln
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        trivyignores: .trivyignore
        exit-code: '1'
        format: table
