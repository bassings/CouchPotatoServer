<script>

/* ── Logs panel (embedded in Settings) ── */
function logsPanel() {
  return {
    logs: [],
    logLoading: false,
    logType: 'all',
    autoRefresh: true,
    refreshTimer: null,

    async init() {
      await this.refresh();
      if (this.autoRefresh) this.startAutoRefresh();
    },

    async refresh() {
      this.logLoading = true;
      try {
        const typeParam = this.logType !== 'all' ? '&type=' + this.logType : '';
        const resp = await fetch(CP.apiBase + '/logging.partial/?limit=500' + typeParam);
        const data = await resp.json();
        if (data.success !== false) {
          this.logs = this.parseLogs(data.log || data.lines || []);
        }
      } catch (e) {
        console.error('Failed to load logs', e);
      }
      this.logLoading = false;
      this.$nextTick(() => {
        const el = document.getElementById('log-container');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    parseLogs(lines) {
      if (!Array.isArray(lines)) return [];
      return lines.map(line => {
        if (typeof line === 'object' && line.time) {
          const msg = line.message || '';
          const srcMatch = msg.match(/^\[([^\]]*)\]\s*(.*)/);
          return {
            time: line.time,
            type: (line.type || 'INFO').toUpperCase(),
            source: srcMatch ? srcMatch[1].trim() : '',
            message: srcMatch ? srcMatch[2] : msg,
          };
        }
        if (typeof line !== 'string') return { time: '', type: 'INFO', source: '', message: String(line) };
        const m = line.match(/^(\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})\s+(ERROR|WARNING|INFO|DEBUG)\s+\[([^\]]*)\]\s*(.*)$/);
        if (m) return { time: m[1], type: m[2], source: m[3].trim(), message: m[4] };
        const levelMatch = line.match(/\b(ERROR|WARNING|INFO|DEBUG)\b/);
        return { time: '', type: levelMatch ? levelMatch[1] : 'INFO', source: '', message: line };
      });
    },

    async clearLogs() {
      try {
        await fetch(CP.apiBase + '/logging.clear/');
        this.logs = [];
      } catch (e) {
        console.error('Failed to clear logs');
      }
    },

    startAutoRefresh() {
      this.stopAutoRefresh();
      this.refreshTimer = setInterval(() => this.refresh(), 10000);
    },

    stopAutoRefresh() {
      if (this.refreshTimer) {
        clearInterval(this.refreshTimer);
        this.refreshTimer = null;
      }
    },

    toggleAutoRefresh() {
      if (this.autoRefresh) this.startAutoRefresh();
      else this.stopAutoRefresh();
    },
  };
}

/* ── Settings panel (main) ── */
function settingsPanel() {
  return {
    activeTab: 'general',
    // Tabs that render their own x-data panel (instead of the generic group
    // list). Add new custom-panel tabs here; the generic-panel x-show in
    // settings.html keys off this Set so it never needs another && condition.
    customPanelTabs: ['logs', 'profiles', 'categories'],
    loading: true,
    saving: false,
    showAdvanced: false,
    needsRestart: false,
    testing: null,
    testResult: {},
    testResultDetails: {},
    message: '',
    messageType: 'success',
    openGroups: {},
    options: {},
    values: {},
    dirty: {},
    tabOrder: [],
    currentGroups: [],
    lastSaved: false,
    saveTimers: {},
    version: '',
    updateAvailable: null,

    // Directory browser state
    browserOpen: false,
    browserPath: '/',
    browserDirs: [],
    browserLoading: false,
    browserTarget: null,
    browserParent: '/',
    browserIsRoot: true,

    // Hidden/obsolete sections
    hiddenSections: new Set([
      'wdtvlive', 'windowsmediacenter', 'sonyps3', 'mediabrowser',
      'pneumatic', 'hadouken', 'homey',
      'awesomehd', 'bithdtv', 'scenetime', 'torrentbytes',
    ]),
    
    advancedSections: new Set([]),
    hiddenTabs: new Set(['providers', 'automation']),
    tabRemaps: { 'automation': 'display' },

    tabLabels: {
      general: 'General',
      profiles: 'Profiles',
      categories: 'Categories',
      downloaders: 'Downloaders',
      searcher: 'Searchers',
      renamer: 'Renamer',
      notifications: 'Notifications',
      manage: 'Library',
      display: 'Suggestions',
      providers: 'Providers',
      logs: 'Logs',
    },

    providerCategories: {
      sabnzbd: { tab: 'downloaders', category: 'usenet', label: 'Usenet Clients', order: 1 },
      nzbget: { tab: 'downloaders', category: 'usenet', label: 'Usenet Clients', order: 1 },
      transmission: { tab: 'downloaders', category: 'torrent', label: 'Torrent Clients', order: 2 },
      qbittorrent: { tab: 'downloaders', category: 'torrent', label: 'Torrent Clients', order: 2 },
      deluge: { tab: 'downloaders', category: 'torrent', label: 'Torrent Clients', order: 2 },
      rtorrent: { tab: 'downloaders', category: 'torrent', label: 'Torrent Clients', order: 2 },
      utorrent: { tab: 'downloaders', category: 'torrent', label: 'Torrent Clients', order: 2 },
      blackhole: { tab: 'downloaders', category: 'other', label: 'Other', order: 3 },
      putio: { tab: 'downloaders', category: 'other', label: 'Other', order: 3 },
      synology: { tab: 'downloaders', category: 'other', label: 'Other', order: 3 },
      binsearch: { tab: 'searcher', category: 'usenet-free', label: 'Usenet — Free', order: 10 },
      newznab: { tab: 'searcher', category: 'usenet-account', label: 'Usenet — Account Required', order: 11 },
      thepiratebay: { tab: 'searcher', category: 'torrent-free', label: 'Torrents — Free', order: 20 },
      yts: { tab: 'searcher', category: 'torrent-free', label: 'Torrents — Free', order: 20 },
      torrentpotato: { tab: 'searcher', category: 'torrent-free', label: 'Torrents — Free', order: 20 },
      iptorrents: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
      passthepopcorn: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
      alpharatio: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
      hdbits: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
      torrentday: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
      torrentleech: { tab: 'searcher', category: 'torrent-account', label: 'Torrents — Account Required', order: 21 },
    },

    combinedBasicsSections: {
      'searcher': { tab: 'searcher', label: 'Basics', order: 1 },
      'nzb': { tab: 'searcher', label: 'NZB', order: 3 },
      'torrent': { tab: 'searcher', label: 'Torrents', order: 4 },
    },
    combinedBasicsGroups: new Set(['searcher', 'filter']),

    // Rich contextual help for settings
    settingHelp: {
      'renamer.from': {
        description: 'The folder where CouchPotato looks for completed downloads.',
        whenToChange: 'Set this to your download client\'s "completed downloads" folder.',
        tip: 'Make sure CouchPotato has read/write access to this folder.',
      },
      'renamer.to': {
        description: 'Your main movie library folder where films are organized.',
        whenToChange: 'Point this to your Plex/Emby/Jellyfin media library.',
        tip: 'Movies will be moved here and renamed according to your rules.',
      },
      'renamer.file_action': {
        description: 'What to do with movie files: move, copy, or create links.',
        whenToChange: '<strong>Move</strong>: Most common.<br><strong>Copy</strong>: Keep original.<br><strong>Link</strong>: Advanced — allows seeding.',
        learnMore: 'Symbolic links create a pointer to the original file. Hard links create a second reference to the same data. Both allow seeding while having organized files.',
      },
      'sabnzbd.host': {
        description: 'The URL where SABnzbd is running.',
        defaultNote: 'Usually http://localhost:8080 for local installs.',
      },
      'sabnzbd.api_key': {
        description: 'API key for authenticating with SABnzbd.',
        whenToChange: 'Find this in SABnzbd → Config → General → API Key.',
      },
    },

    getSettingHelp(section, optName) {
      return this.settingHelp[section + '.' + optName] || null;
    },

    buildDescription(section, opt) {
      // HTML assembly delegated to CP.ui.buildDescription (settings-help.js).
      // Tolerates the no-arg call in field_types.html (opt may be undefined).
      return CP.ui.buildDescription(
        this.getSettingHelp(section, opt && opt.name),
        opt && opt.description
      );
    },

    hasLearnMore(section, optName) {
      const help = this.getSettingHelp(section, optName);
      return help && help.learnMore;
    },

    getLearnMore(section, optName) {
      const help = this.getSettingHelp(section, optName);
      return help ? help.learnMore : '';
    },

    async init() {
      try {
        const resp = await fetch(CP.apiBase + '/settings/');
        const data = await resp.json();
        this.options = data.options || {};
        this.values = data.values || {};

        try {
          const vResp = await fetch(CP.apiBase + '/updater.info/');
          const vData = await vResp.json();
          if (vData.version) this.version = vData.version.repr || vData.version.hash?.substring(0,7) || '';
          if (vData.update_version) this.updateAvailable = vData.update_version;
        } catch (e) {}

        const tabSet = new Set();
        for (const [sectionName, section] of Object.entries(this.options)) {
          if (this.hiddenSections.has(sectionName)) continue;
          for (const grp of (section.groups || [])) {
            tabSet.add(grp.tab || 'general');
          }
        }

        const preferred = ['general', 'searcher', 'downloaders', 'renamer', 'notifications', 'automation', 'manage', 'display'];
        this.tabOrder = preferred.filter(t => tabSet.has(t) && !this.hiddenTabs.has(t));
        for (const t of tabSet) {
          if (!this.tabOrder.includes(t) && !this.hiddenTabs.has(t)) this.tabOrder.push(t);
        }
        if (!this.hiddenTabs.has('profiles') && !this.tabOrder.includes('profiles')) this.tabOrder.push('profiles');
        if (!this.hiddenTabs.has('categories') && !this.tabOrder.includes('categories')) this.tabOrder.push('categories');
        if (!this.hiddenTabs.has('logs') && !this.tabOrder.includes('logs')) this.tabOrder.push('logs');

        this.computeOpenGroups();
        this.updateCurrentGroups();
      } catch (e) {
        console.error('Failed to load settings', e);
        this.toast('Failed to load settings', 'error');
      }
      this.loading = false;
      this.$watch('activeTab', () => this.updateCurrentGroups());
      this.$watch('showAdvanced', () => this.updateCurrentGroups());
    },

    computeOpenGroups() {
      for (const tab of this.tabOrder) {
        const groups = this.getTabGroups(tab);
        groups.forEach((group, idx) => {
          const key = this.groupKey(group, idx);
          const enabler = this.getEnabler(group);
          if (!enabler) this.openGroups[key] = true;
          else if (this.isEnabled(group)) this.openGroups[key] = true;
        });
      }
    },

    updateCurrentGroups() {
      this.currentGroups = this.getTabGroups(this.activeTab);
    },

    groupKey(group, idx) {
      return group.section + '.' + (group.name || 'default') + '.' + (idx || 0);
    },

    getTabGroups(tab) {
      const groups = [];
      const combinedGroups = [];
      
      for (const [sectionName, section] of Object.entries(this.options)) {
        if (this.hiddenSections.has(sectionName)) continue;
        if (this.advancedSections.has(sectionName) && !this.showAdvanced) continue;
        
        for (const grp of (section.groups || [])) {
          let originalTab = grp.tab || 'general';
          let grpTab = this.tabRemaps[originalTab] || originalTab;
          if (grpTab !== tab) continue;
          
          const combineInfo = this.combinedBasicsSections[sectionName];
          if (tab === 'searcher' && combineInfo && combineInfo.tab === 'searcher') {
            combinedGroups.push({
              ...grp,
              section: sectionName,
              order: combineInfo.order + (grp.name === 'filter' ? 0.5 : 0),
              _subLabel: grp.label || combineInfo.label,
              _isCombinedPart: true,
            });
            continue;
          }
          
          const catInfo = this.providerCategories[sectionName];
          groups.push({ 
            ...grp, 
            section: sectionName, 
            order: section.order || 999,
            _category: catInfo ? catInfo.category : 'zzz',
            _categoryLabel: catInfo ? catInfo.label : null,
            _categoryOrder: catInfo ? catInfo.order : 99,
          });
        }
      }
      
      groups.sort((a, b) => {
        if (a._categoryOrder !== b._categoryOrder) return a._categoryOrder - b._categoryOrder;
        return a.order - b.order;
      });
      
      if (combinedGroups.length > 0) {
        combinedGroups.sort((a, b) => a.order - b.order);
        return [{
          name: '_combined_basics',
          label: 'Search Settings',
          section: '_combined',
          _isCombined: true,
          _combinedGroups: combinedGroups,
          _categoryOrder: 0,
          order: 0,
        }, ...groups];
      }
      
      return groups;
    },

    shouldShowCategoryHeader(groupIdx) {
      const group = this.currentGroups[groupIdx];
      if (!group || !group._categoryLabel) return false;
      if (groupIdx === 0) return true;
      return this.currentGroups[groupIdx - 1]._category !== group._category;
    },

    getCategoryLabel(groupIdx) {
      return this.currentGroups[groupIdx]?._categoryLabel || '';
    },

    getGroupOptions(group) {
      const combinedNames = new Set();
      for (const opt of (group.options || [])) {
        if (opt.type === 'combined' && opt.combine) {
          for (const col of opt.combine) {
            if (col !== opt.name) combinedNames.add(col);
          }
        }
      }
      return (group.options || []).filter(opt => !combinedNames.has(opt.name));
    },

    isOptionVisible(opt, group) {
      if (!opt.show_when) return true;
      for (const [key, expected] of Object.entries(opt.show_when)) {
        const [sec, name] = key.split('.');
        const val = this.getVal(sec, name);
        const boolVal = val === true || val === 'True' || val === '1' || val === 1 || val === 'true';
        if (expected === true && !boolVal) return false;
        if (expected === false && boolVal) return false;
        if (typeof expected !== 'boolean' && String(val) !== String(expected)) return false;
      }
      return true;
    },

    getEnabler(group) {
      return (group.options || []).find(o => o.type === 'enabler') || null;
    },

    isEnabled(group) {
      const enabler = this.getEnabler(group);
      if (!enabler) return true;
      // Value coercion delegated to CP.ui.isEnabledValue (settings-values.js).
      return CP.ui.isEnabledValue(this.getVal(group.section, enabler.name));
    },

    toggleEnabler(group) {
      const enabler = this.getEnabler(group);
      if (!enabler) return;
      const newVal = !this.isEnabled(group);
      this.setVal(group.section, enabler.name, newVal);
      const idx = this.currentGroups.indexOf(group);
      if (idx >= 0) this.openGroups[this.groupKey(group, idx)] = newVal;
    },

    getVal(section, name) {
      // Pure resolution delegated to CP.ui.getVal (settings-values.js).
      return CP.ui.getVal({ dirty: this.dirty, values: this.values }, section, name);
    },

    setVal(section, name, value) {
      this.dirty[section + '.' + name] = value;
      this.debounceSave(section, name, value);
    },

    debounceSave(section, name, value) {
      const key = section + '.' + name;
      if (this.saveTimers[key]) clearTimeout(this.saveTimers[key]);
      this.saveTimers[key] = setTimeout(() => this.saveSingle(section, name, value), 500);
    },

    async saveSingle(section, name, value) {
      this.saving = true;
      this.lastSaved = false;
      try {
        const params = new URLSearchParams();
        params.append('section', section);
        params.append('name', name);
        params.append('value', typeof value === 'boolean' ? (value ? '1' : '0') : String(value));
        await fetch(CP.apiBase + '/settings.save/', {
          method: 'POST',
          body: params
        });
        
        if (!this.values[section]) this.values[section] = {};
        this.values[section][name] = value;
        delete this.dirty[section + '.' + name];
        
        const restartKeys = ['core.port', 'core.ssl_cert', 'core.ssl_key', 'core.username', 'core.password'];
        if (restartKeys.includes(section + '.' + name)) this.needsRestart = true;
        
        this.lastSaved = true;
        setTimeout(() => { this.lastSaved = false; }, 2000);
      } catch (e) {
        this.toast('Failed to save: ' + e.message, 'error');
      }
      this.saving = false;
    },

    toggleGroup(key) { this.openGroups[key] = !this.openGroups[key]; },
    isGroupOpen(key) { return !!this.openGroups[key]; },

    async testProvider(group) {
      this.testing = group.section;
      this.testResult[group.section] = '';
      this.testResultDetails[group.section] = null;
      try {
        let endpoint;
        if (group.list === 'download_providers') endpoint = 'download.' + group.section + '.test';
        else if (group.list === 'notification_providers') endpoint = 'notify.' + group.section + '.test';
        else if (group.list === 'nzb_providers' || group.list === 'torrent_providers') endpoint = 'provider.' + group.section + '.test';
        else endpoint = group.section + '.test';
        
        const resp = await fetch(CP.apiBase + '/' + endpoint + '/');
        const data = await resp.json();
        const msg = data.message || data.msg || '';
        
        if (!data.success && msg.includes(';')) {
          const details = msg.split(';').map(part => {
            const trimmed = part.trim();
            const colonIdx = trimmed.indexOf(':');
            if (colonIdx > 0) {
              const host = trimmed.substring(0, colonIdx).trim();
              const result = trimmed.substring(colonIdx + 1).trim();
              const success = result.toLowerCase() === 'ok' || result.toLowerCase() === 'connected';
              return { host, success, error: success ? null : result };
            }
            return { host: trimmed, success: false, error: trimmed };
          });
          this.testResultDetails[group.section] = details;
          this.testResult[group.section] = details.filter(d => d.success).length + '/' + details.length + ' passed';
        } else {
          this.testResult[group.section] = data.success ? 'success' : (msg || 'failed');
        }
      } catch (e) {
        this.testResult[group.section] = 'error';
      }
      this.testing = null;
    },

    async restartApp() {
      try {
        await fetch(CP.apiBase + '/app.restart/');
        this.toast('Restarting…', 'success');
        this.needsRestart = false;
        setTimeout(() => location.reload(), 5000);
      } catch (e) {
        this.toast('Restart failed', 'error');
      }
    },

    toast(msg, type) {
      this.message = msg;
      this.messageType = type;
      setTimeout(() => this.message = '', 3000);
    },

    async browseDirectory(section, name, index = null) {
      this.browserTarget = { section, name, index };
      this.browserOpen = true;
      const currentVal = this.getVal(section, name);
      const startPath = (currentVal && typeof currentVal === 'string' && currentVal.startsWith('/')) ? currentVal : '/';
      this.browserPath = startPath;
      await this.loadDirectories(startPath);
    },

    async loadDirectories(path) {
      this.browserLoading = true;
      try {
        const resp = await fetch(CP.apiBase + '/directory.list/?path=' + encodeURIComponent(path));
        const data = await resp.json();
        this.browserPath = path;
        this.browserDirs = data.dirs || [];
        this.browserParent = data.parent;
        this.browserIsRoot = data.is_root;
      } catch (e) {
        this.browserDirs = [];
      }
      this.browserLoading = false;
    },

    selectDirectory(dir) { this.loadDirectories(dir); },

    confirmDirectory() {
      const path = this.browserPath;
      if (this.browserTarget) {
        const { section, name, index } = this.browserTarget;
        if (index !== null) {
          window.dispatchEvent(new CustomEvent('directory-selected', { detail: { section, name, index, path } }));
        } else {
          this.setVal(section, name, path);
        }
      }
      this.browserOpen = false;
    },
  };
}

/* ── Button field (action buttons) ── */
function buttonField(section, opt) {
  return {
    running: false,
    result: '',
    success: false,
    section,
    opt,

    async execute() {
      if (!opt.button_action) {
        this.result = 'No action configured';
        return;
      }
      this.running = true;
      this.result = '';
      try {
        const resp = await fetch(CP.apiBase + '/' + opt.button_action + '/');
        const data = await resp.json();
        this.success = data.success === true;
        this.result = data.success ? (data.message || 'Success') : (data.error || data.message || 'Failed');
        if (data.success) {
          const panel = this.getPanel();
          if (panel) setTimeout(() => panel.init(), 500);
        }
      } catch (e) {
        this.success = false;
        this.result = 'Error: ' + e.message;
      }
      this.running = false;
    },

    getPanel() {
      let el = this.$el;
      while (el && !el.__x_panel) el = el.parentElement;
      if (!el) el = document.querySelector('[x-data="settingsPanel()"]');
      return el ? Alpine.$data(el) : null;
    },

    buildDescription() {
      const panel = this.getPanel();
      return panel ? panel.buildDescription(this.section, this.opt) : (this.opt.description || '');
    },
  };
}

/* ── Combined field (multi-row entries) ── */
function combinedField(section, opt) {
  return {
    rows: [],
    section,
    opt,
    
    init() {
      const panel = this.getPanel();
      const cols = opt.combine || [];
      const colVals = cols.map(col => {
        const raw = panel.getVal(section, col) || '';
        return String(raw).split(',').map(s => s.trim());
      });
      const maxRows = Math.max(1, ...colVals.map(c => c.length));
      this.rows = [];
      for (let i = 0; i < maxRows; i++) {
        this.rows.push(cols.map((_, ci) => colVals[ci][i] || ''));
      }
    },
    
    getPanel() {
      let el = this.$el;
      while (el && !el.__x_panel) el = el.parentElement;
      if (!el) el = document.querySelector('[x-data="settingsPanel()"]');
      return el ? Alpine.$data(el) : null;
    },
    
    buildDescription() {
      const panel = this.getPanel();
      return panel ? panel.buildDescription(this.section, this.opt) : (this.opt.description || '');
    },
    
    hasLearnMore() {
      const panel = this.getPanel();
      return panel ? panel.hasLearnMore(this.section, this.opt.name) : false;
    },
    
    getLearnMore() {
      const panel = this.getPanel();
      return panel ? panel.getLearnMore(this.section, this.opt.name) : '';
    },
    
    sync() {
      const panel = this.getPanel();
      if (!panel) return;
      (this.opt.combine || []).forEach((col, ci) => {
        panel.setVal(this.section, col, this.rows.map(r => r[ci] || '').join(','));
      });
    },
    
    updateRow(rowIdx, colIdx, value) {
      this.rows[rowIdx][colIdx] = value;
      this.sync();
    },
    
    addRow() { this.rows.push(this.opt.combine.map(() => '')); },
    
    removeRow(idx) {
      if (this.rows.length > 1) {
        this.rows.splice(idx, 1);
        this.sync();
      }
    },
  };
}

/* ── Directories field (multi-path) ── */
function directoriesField(section, opt) {
  return {
    dirs: [],
    section,
    opt,
    _eventHandler: null,
    
    init() {
      const panel = this.getPanel();
      const raw = panel ? panel.getVal(section, opt.name) : '';
      // API returns directories as a JS array; fallback handles legacy '::' strings
      let parts;
      if (Array.isArray(raw)) {
        parts = raw.filter(s => s.trim());
      } else {
        parts = String(raw || '').split('::').filter(s => s.trim());
      }
      this.dirs = parts.length ? parts : [''];
      
      this._eventHandler = (e) => {
        if (e.detail.section === this.section && e.detail.name === this.opt.name) {
          this.updateDir(e.detail.index, e.detail.path);
        }
      };
      window.addEventListener('directory-selected', this._eventHandler);
    },
    
    destroy() {
      if (this._eventHandler) window.removeEventListener('directory-selected', this._eventHandler);
    },
    
    getPanel() {
      let el = this.$el;
      while (el && !el.__x_panel) el = el.parentElement;
      if (!el) el = document.querySelector('[x-data="settingsPanel()"]');
      return el ? Alpine.$data(el) : null;
    },
    
    sync() {
      const panel = this.getPanel();
      if (panel) panel.setVal(this.section, this.opt.name, this.dirs.filter(d => d.trim()).join('::'));
    },
    
    updateDir(idx, value) { this.dirs[idx] = value; this.sync(); },
    addDir() { this.dirs.push(''); },
    removeDir(idx) { if (this.dirs.length > 1) { this.dirs.splice(idx, 1); this.sync(); } },
    browseDir(idx) { const panel = this.getPanel(); if (panel) panel.browseDirectory(this.section, this.opt.name, idx); },
    buildDescription() { const panel = this.getPanel(); return panel ? panel.buildDescription(this.section, this.opt) : (this.opt.description || ''); },
    hasLearnMore() { const panel = this.getPanel(); return panel ? panel.hasLearnMore(this.section, this.opt.name) : false; },
    getLearnMore() { const panel = this.getPanel(); return panel ? panel.getLearnMore(this.section, this.opt.name) : ''; },
  };
}

/* ── Quality Profiles editor (Settings → Profiles tab) ── */
/* Pure logic (profileToForm, formToPayload, addQuality, removeQuality,
   moveQuality, validateProfile) lives in the tested CP.ui.* module so this
   classic script can delegate to it — same pattern as the other components. */
function profileEditor() {
  return {
    // ── State ──
    loaded: false,
    loading: true,
    loadError: '',
    profiles: [],
    qualities: [],
    modalOpen: false,
    deleteConfirmOpen: false,
    profileToDelete: null,
    saving: false,
    deleting: false,
    isReordering: false,
    _toastTimer: null,
    toastMessage: '',
    toastType: 'success',
    validationErrors: [],
    selectedQualityToAdd: '',
    formState: {},
    // crypto.getRandomValues (not Math.random) silences CodeQL js/insecure-randomness; this is a non-security DOM id prefix
    _uid: Array.from(crypto.getRandomValues(new Uint8Array(4)), b => b.toString(16).padStart(2, '0')).join(''),

    // ── Lazy load (named load(), NOT init(): Alpine auto-calls a method named
    //    init() on mount, which would fetch eagerly on every settings page load.
    //    Fired by the $watch on activeTab when the Profiles tab is first opened. ──
    async load() {
      this.loaded = true;
      this.loading = true;
      this.loadError = '';
      try {
        const [pResp, qResp] = await Promise.all([
          fetch(CP.apiBase + '/profile.list/'),
          fetch(CP.apiBase + '/quality.list/'),
        ]);
        if (!pResp.ok) throw new Error('profile.list HTTP ' + pResp.status);
        if (!qResp.ok) throw new Error('quality.list HTTP ' + qResp.status);
        const pData = await pResp.json();
        const qData = await qResp.json();
        if (!pData.success || !qData.success) throw new Error('API returned failure');
        this.profiles = this.sortProfiles(pData.list || []);
        this.qualities = qData.list || [];
      } catch (e) {
        this.loadError = 'Failed to load profiles. Check the server logs.';
        this.loaded = false; // allow a retry on next tab activation
      }
      this.loading = false;
    },

    // ── Helpers ──
    sortProfiles(list) {
      return list.slice().sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    },

    qualityLabel(identifier) {
      const q = this.qualities.find(x => x.identifier === identifier);
      return q ? q.label : identifier;
    },

    get availableQualities() {
      const used = new Set((this.formState.types || []).map(t => t.qualityId));
      return this.qualities.filter(q => !used.has(q.identifier));
    },

    toast(msg, type = 'success', duration = 3000) {
      // Cancel any pending clear timer so a stale one can't wipe a newer toast
      // early (e.g. a success toast immediately followed by a reload-error toast).
      clearTimeout(this._toastTimer);
      this.toastMessage = msg;
      this.toastType = type;
      this._toastTimer = setTimeout(() => { this.toastMessage = ''; }, duration);
    },

    // ── Modal open/close ──
    openNew() {
      this.validationErrors = [];
      this.selectedQualityToAdd = '';
      this.formState = { id: '', label: '', minimumScore: 1, waitFor: 0, stopAfter: 0, types: [] };
      this.modalOpen = true;
      this.$nextTick(() => { if (this.$refs.nameInput) this.$refs.nameInput.focus(); });
    },

    openEdit(profile) {
      this.validationErrors = [];
      this.selectedQualityToAdd = '';
      this.formState = CP.ui.profileToForm(profile, this.qualities);
      this.modalOpen = true;
      this.$nextTick(() => { if (this.$refs.nameInput) this.$refs.nameInput.focus(); });
    },

    closeModal() { this.modalOpen = false; },

    // ── Quality management within the form ──
    addQualityToForm() {
      if (!this.selectedQualityToAdd) return;
      const qId = this.selectedQualityToAdd;
      const qMeta = this.qualities.find(q => q.identifier === qId) || {};
      // addQuality is pure and self-contained: it derives label/allow3d from the
      // passed metadata, so no post-patch is needed.
      const newTypes = CP.ui.addQuality(this.formState.types, qId, qMeta);
      this.formState = { ...this.formState, types: newTypes };
      this.selectedQualityToAdd = '';
    },

    removeQualityAt(index) {
      this.formState = { ...this.formState, types: CP.ui.removeQuality(this.formState.types, index) };
    },

    moveQualityAt(index, direction) {
      this.formState = { ...this.formState, types: CP.ui.moveQuality(this.formState.types, index, direction) };
    },

    setFinish(index, value) {
      if (index === 0) return; // first quality always finishes
      const types = this.formState.types.slice();
      types[index] = { ...types[index], finish: value };
      this.formState = { ...this.formState, types };
    },

    set3d(index, value) {
      const types = this.formState.types.slice();
      types[index] = { ...types[index], is3d: value };
      this.formState = { ...this.formState, types };
    },

    // ── Save profile (save and post-save refresh have SEPARATE error paths) ──
    async saveProfile() {
      this.validationErrors = [];
      const v = CP.ui.validateProfile(this.formState);
      if (!v.valid) { this.validationErrors = v.errors; return; }

      // Pass the current count so a NEW profile gets order = count (appended)
      // instead of the backend default order=999.
      const payload = CP.ui.formToPayload(this.formState, this.profiles.length);
      const isEdit = !!payload.id; // snapshot before any await
      this.saving = true;

      let saved = false;
      try {
        const params = new URLSearchParams();
        if (payload.id) params.append('id', payload.id);
        params.append('label', payload.label);
        params.append('minimum_score', String(payload.minimum_score));
        params.append('wait_for', String(payload.wait_for));
        params.append('stop_after', String(payload.stop_after));
        // New profiles carry an explicit order (= current count) so they append
        // at the end instead of landing at the backend default order=999.
        if (!payload.id && payload.order !== undefined) params.append('order', String(payload.order));
        // The API's getParams() expands bracket-notation form keys into a list
        // of dicts (types[0][quality]=…). A JSON string would be iterated
        // character-by-character server-side, so send discrete bracket keys.
        payload.types.forEach((t, i) => {
          params.append(`types[${i}][quality]`, t.quality);
          params.append(`types[${i}][finish]`, String(t.finish));
          params.append(`types[${i}][3d]`, String(t['3d']));
        });

        const resp = await fetch(CP.apiBase + '/profile.save/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Save failed');
        saved = true;
      } catch (e) {
        this.toast('Save failed: ' + e.message, 'error');
      }
      this.saving = false;

      if (!saved) return;

      // Save succeeded — close + confirm BEFORE the refresh so a refresh
      // error can never masquerade as a save error.
      this.closeModal();
      this.toast(isEdit ? 'Profile updated.' : 'Profile created.', 'success');

      try {
        await this.reload();
      } catch (e) {
        this.toast('Saved, but the list failed to refresh.', 'error');
      }
    },

    // ── Delete profile ──
    confirmDelete(profile) {
      if (profile.core) return; // built-in profiles aren't deletable (button is also disabled)
      if (this.modalOpen) return; // never open the delete dialog over an open edit modal (keeps the two window-scoped Escape handlers mutually exclusive)
      this.profileToDelete = profile;
      this.deleteConfirmOpen = true;
      this.$nextTick(() => { if (this.$refs.deleteCancelBtn) this.$refs.deleteCancelBtn.focus(); });
    },

    cancelDelete() {
      this.deleteConfirmOpen = false;
      this.profileToDelete = null;
    },

    async doDelete() {
      if (!this.profileToDelete) return;
      const delId = this.profileToDelete._id;     // snapshot before await —
      const delLabel = this.profileToDelete.label; // dialog may be torn down mid-flight
      this.deleting = true;

      let deleted = false;
      try {
        const params = new URLSearchParams();
        params.append('id', delId);
        const resp = await fetch(CP.apiBase + '/profile.delete/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Delete failed');
        deleted = true;
      } catch (e) {
        this.toast('Delete failed: ' + e.message, 'error');
      }
      this.deleting = false;

      // On failure, leave the confirm dialog open so the user can retry without
      // re-opening it; only close it on success. delId/delLabel are snapshotted
      // above, so leaving profileToDelete set carries no null-deref risk.
      if (!deleted) return;
      this.cancelDelete();
      this.toast('"' + delLabel + '" deleted.', 'success');

      try {
        await this.reload();
      } catch (e) {
        this.toast('Deleted, but the list failed to refresh.', 'error');
      }
    },

    // ── Reorder profiles (optimistic with rollback on failure) ──
    async moveProfile(index, direction) {
      // Guard against overlapping reorders: if a second move starts before the
      // first save_order resolves, a failed-then-succeeded pair can leave the
      // client rolled back to a stale snapshot while the server holds a newer
      // order (silent split-brain). Serialise by disabling moves while in-flight.
      if (this.isReordering) return;
      const target = direction === 'up' ? index - 1 : index + 1;
      if (target < 0 || target >= this.profiles.length) return;

      const snapshot = this.profiles.slice(); // restore point
      const list = this.profiles.slice();
      [list[target], list[index]] = [list[index], list[target]];
      this.profiles = list;
      this.isReordering = true;

      try {
        const params = new URLSearchParams();
        // Indexed bracket keys (ids[0], ids[1], …), NOT repeated ids[]: the
        // dispatcher does dict(await request.form()), which collapses repeated
        // keys to the last value. getParams() then expands the indexed keys
        // back into ordered lists. Repeated keys would send a single id and
        // silently break every reorder.
        list.forEach((p, i) => {
          params.append(`ids[${i}]`, p._id);
          params.append(`hidden[${i}]`, p.hide ? '1' : '0');
        });
        const resp = await fetch(CP.apiBase + '/profile.save_order/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Reorder failed');
      } catch (e) {
        this.profiles = snapshot; // roll back the optimistic move
        this.toast('Failed to save order.', 'error');
      } finally {
        this.isReordering = false;
      }
    },

    // ── Reload from API (throws on failure so callers can react) ──
    async reload() {
      const resp = await fetch(CP.apiBase + '/profile.list/');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if (!data.success) throw new Error('API returned failure');
      this.profiles = this.sortProfiles(data.list || []);
    },

    // ── Focus traps ──
    trapFocus(event) {
      if (!this.modalOpen) return;
      const el = this.$refs.modalEl;
      if (!el) return;
      const focusable = Array.from(el.querySelectorAll(
        'button:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
      ));
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      // Recapture focus if it has escaped the dialog entirely (programmatic
      // focus, extension, etc.), not just at the first/last boundary.
      if (!el.contains(document.activeElement)) { event.preventDefault(); first.focus(); return; }
      if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
      else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    },

    trapDeleteFocus(event) {
      if (!this.deleteConfirmOpen) return;
      const el = this.$refs.deleteEl;
      if (!el) return;
      const focusable = Array.from(el.querySelectorAll('button:not([disabled])'));
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (!el.contains(document.activeElement)) { event.preventDefault(); first.focus(); return; }
      if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
      else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    },
  };
}

/* ── Category editor (Settings → Categories tab) ── */
/* Pure logic (categoryToForm, categoryFormToPayload, validateCategory) lives in the
   tested CP.ui.* module so this classic script can delegate to it. */
function categoryEditor() {
  return {
    // ── State ──
    loaded: false,
    loading: true,
    loadError: '',
    categories: [],
    modalOpen: false,
    deleteConfirmOpen: false,
    categoryToDelete: null,
    saving: false,
    deleting: false,
    isReordering: false,
    _reloadGen: 0, // bumped whenever reload() replaces the categories array
    _modalTrigger: null, // element to refocus when the edit modal closes (WCAG 2.4.3)
    _deleteTrigger: null, // element to refocus when the delete dialog closes
    _toastTimer: null,
    toastMessage: '',
    toastType: 'success',
    validationErrors: [],
    // Explicit blank shape (not {}) so the template's formState reads are defined
    // before openNew()/openEdit() rather than relying on Alpine's undefined->'' coercion.
    formState: { id: '', label: '', ignored: '', preferred: '', required: '', destination: '', order: 999 },
    // crypto.getRandomValues (not Math.random) silences CodeQL js/insecure-randomness; this is a non-security DOM id prefix
    _uid: Array.from(crypto.getRandomValues(new Uint8Array(4)), b => b.toString(16).padStart(2, '0')).join(''),

    // ── Lazy load (named load(), NOT init(): Alpine auto-calls a method named
    //    init() on mount, which would fetch eagerly on every settings page load.
    //    Fired by the $watch on activeTab when the Categories tab is first opened. ──
    async load() {
      this.loaded = true;
      this.loading = true;
      this.loadError = '';
      try {
        const resp = await fetch(CP.apiBase + '/category.list/');
        if (!resp.ok) throw new Error('category.list HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error('API returned failure');
        this.categories = this.sortCategories(data.categories || []);
      } catch (e) {
        this.loadError = 'Failed to load categories. Check the server logs.';
        this.loaded = false; // allow a retry on next tab activation
      }
      this.loading = false;
    },

    // ── Helpers ──
    sortCategories(list) {
      // Coerce exactly like categoryToForm: order may arrive as a string from the
      // API, and an absent order falls back to 999 (the backend default) so
      // unknown-order categories sort to the END — matching both the edit form
      // and the server, rather than floating to the top.
      const ord = (c) => (c.order != null ? Number(c.order) : 999);
      return list.slice().sort((a, b) => ord(a) - ord(b));
    },

    toast(msg, type = 'success', duration = 3000) {
      // Cancel any pending clear timer so a stale one can't wipe a newer toast
      // early (e.g. a success toast immediately followed by a reload-error toast).
      clearTimeout(this._toastTimer);
      this.toastMessage = msg;
      this.toastType = type;
      this._toastTimer = setTimeout(() => { this.toastMessage = ''; }, duration);
    },

    // ── Modal open/close ──
    openNew() {
      this._modalTrigger = document.activeElement; // refocus on close (WCAG 2.4.3)
      this.validationErrors = [];
      // Delegate to the tested helper so openNew/openEdit stay in sync as the
      // category model evolves (a new field is picked up by both for free).
      this.formState = CP.ui.categoryToForm({});
      this.modalOpen = true;
      this.$nextTick(() => { if (this.$refs.labelInput) this.$refs.labelInput.focus(); });
    },

    openEdit(category) {
      this._modalTrigger = document.activeElement; // refocus on close (WCAG 2.4.3)
      this.validationErrors = [];
      this.formState = CP.ui.categoryToForm(category);
      this.modalOpen = true;
      this.$nextTick(() => { if (this.$refs.labelInput) this.$refs.labelInput.focus(); });
    },

    closeModal() {
      this.modalOpen = false;
      // Return keyboard focus to the trigger so SR/keyboard users aren't stranded
      // on <body>. Skip if the trigger was removed from the DOM (e.g. its row).
      const t = this._modalTrigger;
      this._modalTrigger = null;
      this.$nextTick(() => { if (t && t.isConnected) t.focus(); });
    },

    // ── Save category (save and post-save refresh have SEPARATE error paths) ──
    async saveCategory() {
      this.validationErrors = [];
      const v = CP.ui.validateCategory(this.formState);
      if (!v.valid) { this.validationErrors = v.errors; return; }

      const payload = CP.ui.categoryFormToPayload(this.formState, this.categories.length);
      const isEdit = !!payload.id; // snapshot before any await
      this.saving = true;

      let saved = false;
      try {
        // categoryFormToPayload owns which keys are present: always the scalar
        // fields, plus id (edits) XOR order (new categories append at the end).
        // Iterating it keeps this builder from drifting when the model gains a
        // field. All values are scalars, so plain append is correct — the bracket
        // -key wire format only applies to the list params in moveCategory().
        const params = new URLSearchParams();
        for (const [k, paramVal] of Object.entries(payload)) {
          params.append(k, String(paramVal));
        }

        const resp = await fetch(CP.apiBase + '/category.save/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Save failed');
        saved = true;
      } catch (e) {
        this.toast('Save failed: ' + e.message, 'error');
      }
      this.saving = false;

      if (!saved) return;

      // Save succeeded — close + confirm BEFORE the refresh so a refresh
      // error can never masquerade as a save error.
      this.closeModal();
      this.toast(isEdit ? 'Category updated.' : 'Category created.', 'success');

      try {
        await this.reload();
      } catch (e) {
        this.toast('Saved, but the list failed to refresh.', 'error');
      }
    },

    // ── Delete category ──
    confirmDelete(category) {
      if (this.modalOpen) return; // never open the delete dialog over an open edit modal
      this._deleteTrigger = document.activeElement; // refocus on close (WCAG 2.4.3)
      this.categoryToDelete = category;
      this.deleteConfirmOpen = true;
      this.$nextTick(() => { if (this.$refs.deleteCancelBtn) this.$refs.deleteCancelBtn.focus(); });
    },

    cancelDelete(skipFocusReturn = false) {
      this.deleteConfirmOpen = false;
      this.categoryToDelete = null;
      // Return focus to the Delete button that opened the dialog (cancel/escape
      // path). On a confirmed delete, doDelete() passes skipFocusReturn=true and
      // takes ownership of focus (→ New Category) — otherwise this would briefly
      // focus the about-to-be-removed row before doDelete's $nextTick overrides it.
      if (skipFocusReturn) { this._deleteTrigger = null; return; }
      const t = this._deleteTrigger;
      this._deleteTrigger = null;
      this.$nextTick(() => { if (t && t.isConnected) t.focus(); });
    },

    async doDelete() {
      if (!this.categoryToDelete) return;
      const delId = this.categoryToDelete._id;     // snapshot before await —
      const delLabel = this.categoryToDelete.label; // dialog may be torn down mid-flight
      this.deleting = true;

      let deleted = false;
      try {
        const params = new URLSearchParams();
        params.append('id', delId);
        const resp = await fetch(CP.apiBase + '/category.delete/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Delete failed');
        deleted = true;
      } catch (e) {
        this.toast('Delete failed: ' + e.message, 'error');
      }
      this.deleting = false;

      // On failure, leave the confirm dialog open so the user can retry;
      // only close it on success.
      if (!deleted) return;
      this.cancelDelete(true); // skip the dialog's own focus-return; we own it here
      this.toast('"' + delLabel + '" deleted.', 'success');
      // WCAG 2.4.3: the trigger row is about to be removed by reload(); land focus
      // on the always-present New Category button instead of dropping it to <body>.
      this.$nextTick(() => { if (this.$refs.newCategoryBtn) this.$refs.newCategoryBtn.focus(); });

      // Drop the row optimistically so a failed reload() can't leave a ghost row
      // with live Edit/Delete buttons pointing at a server-side-deleted id.
      this.categories = this.categories.filter(c => c._id !== delId);
      try {
        await this.reload();
      } catch (e) {
        this.toast('Deleted, but the list failed to refresh.', 'error');
      }
    },

    // ── Reorder categories (optimistic with rollback on failure) ──
    async moveCategory(index, direction) {
      // Guard against overlapping reorders: serialise by disabling moves while in-flight.
      if (this.isReordering) return;
      const target = direction === 'up' ? index - 1 : index + 1;
      if (target < 0 || target >= this.categories.length) return;

      const snapshot = this.categories.slice(); // restore point
      const list = this.categories.slice();
      [list[target], list[index]] = [list[index], list[target]];
      this.categories = list;
      const gen = this._reloadGen; // generation at the time of the optimistic move
      this.isReordering = true;

      try {
        const params = new URLSearchParams();
        // Indexed bracket keys (ids[0], ids[1], …), NOT repeated ids[]: the
        // dispatcher does dict(await request.form()), which collapses repeated
        // keys to the last value. getParams() then expands the indexed keys
        // back into ordered lists. Repeated keys would silently send a single id
        // and break every reorder.
        list.forEach((c, i) => {
          params.append(`ids[${i}]`, c._id);
        });
        const resp = await fetch(CP.apiBase + '/category.save_order/', { method: 'POST', body: params });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success) throw new Error(data.message || 'Reorder failed');
      } catch (e) {
        // Only roll back if nothing else replaced the categories array while this
        // POST was in-flight. A concurrent saveCategory()+reload() bumps _reloadGen
        // and writes a fresher list; clobbering it with the pre-move snapshot would
        // silently discard the just-saved edit from the UI. (Identity comparison
        // can't be used here — Alpine wraps `this.categories` in a reactive proxy,
        // so `this.categories === list` is never true.)
        if (this._reloadGen === gen) {
          this.categories = snapshot; // roll back the optimistic move
        }
        this.toast('Failed to save order.', 'error');
      } finally {
        this.isReordering = false;
      }
    },

    // ── Reload from API (throws on failure so callers can react) ──
    async reload() {
      const resp = await fetch(CP.apiBase + '/category.list/');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if (!data.success) throw new Error('API returned failure');
      this.categories = this.sortCategories(data.categories || []);
      this._reloadGen++; // signal in-flight reorders that the list was replaced
    },

    // ── Focus traps ──
    // Shared cyclic focus trap for both the edit modal and the delete dialog;
    // they differ only by their open-flag and $refs key.
    _trapFocusIn(open, refKey, event) {
      if (!open) return;
      const el = this.$refs[refKey];
      if (!el) return;
      const focusable = Array.from(el.querySelectorAll(
        'button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), a[href]:not([tabindex="-1"]), [tabindex]:not([tabindex="-1"])'
      ));
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (!el.contains(document.activeElement)) { event.preventDefault(); first.focus(); return; }
      if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
      else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    },

    trapFocus(event)       { this._trapFocusIn(this.modalOpen, 'modalEl', event); },
    trapDeleteFocus(event) { this._trapFocusIn(this.deleteConfirmOpen, 'deleteEl', event); },
  };
}
