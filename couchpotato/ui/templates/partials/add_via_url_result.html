{% if movie %}
{% with movies = [movie] %}
{% include "partials/search_results.html" %}
{% endwith %}
{% else %}
<div class="text-center text-cp-muted py-20" role="status">
  <svg aria-hidden="true" class="w-12 h-12 mx-auto mb-3 text-cp-border" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
  </svg>
  <p class="text-sm font-medium">Couldn't find a movie at that URL</p>
  {% if error %}
  <p class="text-xs mt-1 font-light">{{ error }}</p>
  {% endif %}
  {% if url %}
  <p class="text-[10px] mt-3 truncate max-w-md mx-auto" title="{{ url }}">{{ url }}</p>
  {% endif %}
</div>
{% endif %}
